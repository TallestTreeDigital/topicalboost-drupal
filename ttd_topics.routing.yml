topicalboost.example:
  path: '/topicalboost/example'
  defaults:
    _title: 'Example'
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::build'
  requirements:
    _permission: 'access content'

topicalboost.settings_form:
  path: '/admin/config/content/topicalboost'
  defaults:
    _title: 'TopicalBoost'
    _form: 'Drupal\ttd_topics\Form\SettingsForm'
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis:
  path: '/admin/config/content/topicalboost/bulk-analysis'
  defaults:
    _controller: 'Drupal\ttd_topics\Controller\TtdTopicsController::redirectToSettings'
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.get_topics:
  path: '/admin/config/content/topicalboost/get-topics'
  defaults:
    _title: 'Get Topics'
    _form: 'Drupal\ttd_topics\Form\GetTopicsForm'
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.api.topic_count:
  path: '/api/topicalboost/topic-count'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::getTopicCount'
  methods: [GET]
  requirements:
    _access: 'TRUE'

topicalboost.api.recommendations:
  path: '/api/topicalboost/recommendations'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::getRecommendations'
  methods: [GET]
  requirements:
    _access: 'TRUE'

topicalboost.bulk_analysis.count:
  path: '/api/topicalboost/bulk-analysis/count'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::getNodeCount'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis.initiate:
  path: '/api/topicalboost/bulk-analysis/initiate'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::initiateAnalysis'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis.progress:
  path: '/api/topicalboost/bulk-analysis/progress'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::getProgress'
  methods: [GET]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis.reset:
  path: '/api/topicalboost/bulk-analysis/reset'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::resetAnalysis'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis.poll:
  path: '/api/topicalboost/bulk-analysis/poll'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::pollAnalysis'
  methods: [GET]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.bulk_analysis.apply_results:
  path: '/api/topicalboost/bulk-analysis/apply-results'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\BulkAnalysisController::applyResults'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.api.validate_key:
  path: '/api/topicalboost/validate-api-key'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\ApiValidationController::validateApiKey'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'

topicalboost.field_inspector:
  path: '/admin/topicalboost/field-inspector/{node}'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\FieldInspectorController::inspectFields'
  methods: [GET]
  requirements:
    _permission: 'administer nodes'
    node: \d+

topicalboost.field_inspector.recent_nodes:
  path: '/admin/topicalboost/field-inspector/recent-nodes'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\FieldInspectorController::getRecentNodes'
  methods: [GET]
  requirements:
    _permission: 'administer nodes'

topicalboost.field_inspector.search:
  path: '/api/topicalboost/field-inspector/search'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\FieldInspectorController::searchNodesByTitle'
  methods: [GET]
  requirements:
    _permission: 'administer nodes'

topicalboost.api.check_analysis_status:
  path: '/ttd-topics/check-analysis-status/{node}'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::checkAnalysisStatus'
  methods: [GET]
  requirements:
    _permission: 'access content'
    node: \d+

topicalboost.api.coverage_metrics:
  path: '/api/topicalboost/coverage/metrics'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\CoverageController::getMetrics'
  methods: [GET]
  requirements:
    _permission: 'administer topicalboost configuration'

# Meta Generation API routes
topicalboost.api.meta.get_keywords:
  path: '/api/topicalboost/meta/keywords/{node}'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\MetaGeneratorController::getKeywords'
  methods: [GET]
  requirements:
    _permission: 'administer nodes'
    node: \d+

topicalboost.api.meta.generate:
  path: '/api/topicalboost/meta/generate'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\MetaGeneratorController::generate'
  methods: [POST]
  requirements:
    _permission: 'administer nodes'

topicalboost.api.meta.save:
  path: '/api/topicalboost/meta/save'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\MetaGeneratorController::save'
  methods: [POST]
  requirements:
    _permission: 'administer nodes'

