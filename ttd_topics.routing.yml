  methods: [POST]
  requirements:
    _permission: 'administer nodes'

ttd_topics.update_topics:
  path: '/api/topicalboost/topics/update'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::updateTopics'
