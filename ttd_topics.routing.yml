topicalboost.api.pinned_posts_search:
  path: '/api/topicalboost/pinned-posts/search'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::searchPinnedPosts'
  methods: [GET]
  requirements:
    _permission: 'administer nodes'

topicalboost.api.telemetry:
  path: '/api/topicalboost/telemetry/js-errors'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TelemetryController::receiveJsErrors'
  methods: [POST]
  requirements:
    _permission: 'access content'

topicalboost.api.toggle_topic_visibility:
  path: '/api/topicalboost/topic/{taxonomy_term}/toggle-visibility'
  defaults:
    _controller: '\Drupal\ttd_topics\Controller\TtdTopicsController::toggleTopicVisibility'
  methods: [POST]
  requirements:
    _permission: 'administer topicalboost configuration'
    taxonomy_term: \d+

