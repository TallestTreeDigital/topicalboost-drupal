services:
  ttd_topics.commands:
    class: \Drupal\ttd_topics\Commands\CreateTtdTopicsCommand
    tags:
      - { name: drush.command }

  ttd_topics.attribute_commands:
    class: \Drupal\ttd_topics\Commands\AttributeTtdTopicsCommand
    tags:
      - { name: drush.command }

  ttd_topics.clear_commands:
    class: \Drupal\ttd_topics\Commands\ClearTtdTopicsCommand
    tags:
      - { name: drush.command }

  ttd_topics.hide_commands:
    class: \Drupal\ttd_topics\Commands\HideTtdTopicsCommand
    tags:
      - { name: drush.command }

  ttd_topics.sync_hidden_commands:
    class: \Drupal\ttd_topics\Commands\SyncHiddenEntitiesCommand
    tags:
      - { name: drush.command }

  ttd_topics.sync_curation_scores_commands:
    class: \Drupal\ttd_topics\Commands\SyncCurationScoresCommand
    tags:
      - { name: drush.command }

  ttd_topics.sync_local_curation_overrides_commands:
    class: \Drupal\ttd_topics\Commands\SyncLocalCurationOverridesCommand
    tags:
      - { name: drush.command }

  ttd_topics.maintenance_commands:
    class: \Drupal\ttd_topics\Commands\TopicalBoostMaintenanceCommands
    tags:
      - { name: drush.command }
