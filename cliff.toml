[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^chore", group = "Maintenance" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^(Add|Added|Auto-fetch|Expose|Move|Moved)", group = "Features" },
    { message = "^(Fix|Fixed|Guard|Harden|Normalize|Align|Clarify|Prevent|Stop)", group = "Bug Fixes" },
    { message = "^(Improve|Improved|Optimize|Prioritize|Simplify)", group = "Performance" },
    { message = "^(Center|Polish|Sharpen)", group = "Styling" },
    { message = ".*", skip = true },
]
filter_commits = false
tag_pattern = "v?[0-9].*"
sort_commits = "newest"
